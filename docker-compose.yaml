services:
  desktop:
    build: .
    image: openclaw-desktop
    container_name: ${HOSTNAME:-openclaw}
    hostname: ${HOSTNAME:-openclaw}
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=${TZ:-UTC}
      - TITLE=${TITLE:-OpenClaw Desktop}
      - CUSTOM_USER=${CUSTOM_USER:-admin}
      - PASSWORD=${PASSWORD:?Set PASSWORD in .env}
    volumes:
      - ./config/obsidian:/config/.config/obsidian
      - ./config/openclaw:/config/.openclaw
      - ./vaults:/config/Obsidian
    ports:
      - "${HTTP_PORT:-3000}:3000"
      - "${HTTPS_PORT:-3001}:3001"
      - "${OPENCLAW_PORT:-18789}:18789"
    dns:
      - ${DNS_SERVER:-8.8.8.8}
    shm_size: "1gb"
    restart: unless-stopped
